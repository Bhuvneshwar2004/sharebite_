<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ShareBite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="auth-body">
    <div class="auth-container fade-in">
        <div class="auth-header">
            <h1><span class="logo-icon">🍲</span> ShareBite</h1>
            <p id="auth-subtitle">Sign in to your account</p>
        </div>

        <form id="login-form" class="auth-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" required>
            </div>
            <button type="submit" class="btn-primary">Log In</button>
            <p class="auth-switch">Don't have an account? <span onclick="toggleAuth()">Sign up here</span></p>
        </form>

        <form id="register-form" class="auth-form" style="display: none;">
            <div class="input-group">
                <label>Organization Name</label>
                <input type="text" id="reg-name" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="reg-email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="reg-password" required>
            </div>
            <div class="input-group">
                <label>I am a...</label>
                <select id="reg-role" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border);">
                    <option value="donor">Food Donor (Restaurant/Store)</option>
                    <option value="receiver">Food Receiver (NGO/Shelter)</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
            <p class="auth-switch">Already have an account? <span onclick="toggleAuth()">Log in here</span></p>
        </form>
    </div>

    <script src="auth.js"></script>
</body>
</html>
